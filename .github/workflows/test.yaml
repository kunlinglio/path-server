name: Check and Test

on:
  pull_request:
    branches: [master]
  workflow_call:
jobs:
  check-rust:
    name: Format and Clippy Path Server and Zed Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check for Path Server
        run: |
          cargo fmt --all -- --check
          cargo clippy -- -D warnings

      - name: Check for Zed Extension
        working-directory: ./extensions/zed
        run: |
          cargo fmt --all -- --check
          cargo clippy -- -D warnings

  check-typescript:
    name: Check VSCode Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./extensions/vscode
        run: npm install

      - name: Check types for VS Code Extension
        working-directory: ./extensions/vscode
        run: npm run check-types
      - name: Lint VS Code Extension
        working-directory: ./extensions/vscode
        run: npm run lint

  # Test Path Server on 3 platforms
  test-path-server:
    name: Test Path Server on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests in debug mode
        run: cargo test

      - name: Run tests in release mode
        run: cargo test --release
